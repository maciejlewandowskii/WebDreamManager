---
# WebDream Manager — production compose
# 1. Copy this file to your server as compose.yaml
# 2. Create a .env.prod file next to it (see .env.example in the release)
# 3. docker compose up -d

services:
  php:
    image: ghcr.io/maciejlewandowskii/webdreammanager:latest
    restart: unless-stopped
    env_file:
      - path: .env.prod
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      database:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - app_var:/app/var
      - ./frankenphp/certs:/etc/caddy/certs:ro
    ports:
      - "[::]:80:80"
      - "[::]:443:443"
      - "[::]:443:443/udp"

  worker:
    image: ghcr.io/maciejlewandowskii/webdreammanager:latest
    restart: unless-stopped
    command: ["php", "bin/console", "messenger:consume", "async", "failed", "--time-limit=3600", "--memory-limit=128M", "-vv"]
    env_file:
      - path: .env.prod
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      database:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - app_var:/app/var

  database:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - path: .env.prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $$POSTGRES_DB -U $$POSTGRES_USER"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw

  # Optional: uncomment to enable automatic updates when a new image is pushed
  # watchtower:
  #   image: containrrr/watchtower:latest
  #   restart: unless-stopped
  #   environment:
  #     - DOCKER_API_VERSION=1.40
  #     - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_TOKEN:-changeme}
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: --interval 3600 --cleanup --label-enable --http-api-update

volumes:
  caddy_data:
  caddy_config:
  app_var:
  database_data:
