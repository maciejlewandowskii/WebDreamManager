---
# WebDream Manager — production compose
# 1. Copy this file to your server as compose.yaml
# 2. Create a .env file next to it (see .env.example in the release)
# 3. docker compose up -d

services:
  php:
    image: ghcr.io/maciejlewandowskii/webdreammanager:latest
    restart: unless-stopped
    environment:
      SERVER_NAME: ${APP_DOMAIN}
      DEFAULT_URI: https://${APP_DOMAIN}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?serverVersion=${POSTGRES_VERSION:-16}&charset=utf8
      MERCURE_URL: http://php/.well-known/mercure
      MERCURE_PUBLIC_URL: https://${APP_DOMAIN}/.well-known/mercure
      MERCURE_JWT_SECRET: ${CADDY_MERCURE_JWT_SECRET}
      MERCURE_PUBLISHER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET}
      MERCURE_SUBSCRIBER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET}
      CADDY_SERVER_EXTRA_DIRECTIVES: "tls /etc/caddy/certs/cf-origin.pem /etc/caddy/certs/cf-origin.key"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - app_var:/app/var
      - ./frankenphp/certs:/etc/caddy/certs:ro
    ports:
      - "[::]:80:80"
      - "[::]:443:443"
      - "[::]:443:443/udp"

  worker:
    image: ghcr.io/maciejlewandowskii/webdreammanager:latest
    restart: unless-stopped
    command: ["php", "bin/console", "messenger:consume", "async", "failed", "--time-limit=3600", "--memory-limit=128M", "-vv"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?serverVersion=${POSTGRES_VERSION:-16}&charset=utf8
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - app_var:/app/var

  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB}", "-U", "${POSTGRES_USER}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw

  # Optional: uncomment to enable automatic updates when a new image is pushed
  # watchtower:
  #   image: containrrr/watchtower
  #   restart: unless-stopped
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: --interval 3600 --cleanup

volumes:
  caddy_data:
  caddy_config:
  app_var:
  database_data:
