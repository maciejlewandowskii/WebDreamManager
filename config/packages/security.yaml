security:
    password_hashers:
        App\Domain\Identity\Entity\User:
            algorithm: bcrypt
            cost: 13

    providers:
        app_user_provider:
            entity:
                class: App\Domain\Identity\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            entry_point: form_login
            form_login:
                login_path: app_identity_login
                check_path: app_identity_login
                username_parameter: email
                password_parameter: password
                enable_csrf: true
                default_target_path: app_dashboard
            logout:
                path: app_identity_logout
                target: app_identity_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 2592000
            two_factor:
                auth_form_path: 2fa_login
                check_path: 2fa_login_check
                default_target_path: app_dashboard

    role_hierarchy:
        ROLE_MANAGER: ROLE_USER
        ROLE_ADMIN: ROLE_MANAGER

    access_control:
        - { path: ^/_profiler, roles: PUBLIC_ACCESS }
        - { path: ^/_wdt, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/passkey, roles: PUBLIC_ACCESS }
        - { path: ^/account/setup, roles: PUBLIC_ACCESS }
        - { path: ^/pay, roles: PUBLIC_ACCESS }
        - { path: ^/stripe/webhook, roles: PUBLIC_ACCESS }
        - { path: ^/logout, roles: PUBLIC_ACCESS }
        - { path: ^/2fa, roles: IS_AUTHENTICATED_2FA_IN_PROGRESS }
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            App\Domain\Identity\Entity\User:
                algorithm: auto
                cost: 4
