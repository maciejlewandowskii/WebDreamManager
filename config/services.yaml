parameters:
    uploads_dir: '%kernel.project_dir%/public/uploads'
    project_files_dir: '%kernel.project_dir%/var/project_files'
    customer_files_dir: '%kernel.project_dir%/var/customer_files'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Domain/*/Entity/'
            - '../src/Domain/*/ValueObject/'
            - '../src/Kernel.php'

    App\Infrastructure\External\Email\SymfonyMailerEmailSender:
        arguments:
            $fromAddress: '%env(MAILER_FROM)%'
            $fromName: '%env(MAILER_FROM_NAME)%'

    App\Infrastructure\Communications\Port\EmailSenderInterface:
        alias: App\Infrastructure\External\Email\SymfonyMailerEmailSender

    App\Infrastructure\Pdf\DocumentPdfGenerator:
        arguments:
            $projectFilesDir: '%kernel.project_dir%/var/project_files'
            $customerFilesDir: '%kernel.project_dir%/var/customer_files'

    App\Domain\Invoicing\Port\PaymentGatewayInterface:
        alias: App\Infrastructure\External\Stripe\StripeGateway
